# Mask2Former fine-tuning config for MSD Lung (Task06) segmentation
#
# Available HuggingFace model IDs (pass as --m2f_model):
#   facebook/mask2former-swin-tiny-ade-semantic     ~47M  params
#   facebook/mask2former-swin-base-ade-semantic     ~102M params  ← default
#   facebook/mask2former-swin-large-ade-semantic    ~212M params

# ── Data ───────────────────────────────────────────────────────────────────
data_dir: "./data/lung"
img_size: 512
batch_size: 2
num_workers: 4

# ── Training ───────────────────────────────────────────────────────────────
max_epochs: 50
lr: 1.0e-4
backbone_lr: 1.0e-5
weight_decay: 0.05
warmup_steps: 500
val_check_interval: 1.0
devices: 1
precision: "bf16-mixed"

# ── Mask2Former architecture ────────────────────────────────────────────────
m2f_model: "facebook/mask2former-swin-base-ade-semantic"

# ── Logging ────────────────────────────────────────────────────────────────
output_dir: "./checkpoints"
run_name: "mask2former_lung_b512"
