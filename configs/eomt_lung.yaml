# EoMT fine-tuning config for MSD Lung (Task06) segmentation

# ── Data ───────────────────────────────────────────────────────────────────
data_dir: "./data/lung"
img_size: 512
batch_size: 2       # per GPU; effective batch = batch_size × devices
num_workers: 4

# ── Training ───────────────────────────────────────────────────────────────
max_epochs: 50
lr: 1.0e-4
backbone_lr: 1.0e-5
weight_decay: 0.05
warmup_steps: 500
val_check_interval: 1.0
devices: 1
precision: "16-mixed"

# ── EoMT architecture ──────────────────────────────────────────────────────
#   base  model: vit_base_patch14_reg4_dinov2.lvd142m   ~86M params backbone
#   large model: vit_large_patch14_reg4_dinov2.lvd142m  ~307M params backbone
backbone_name: "vit_base_patch14_reg4_dinov2.lvd142m"
num_q: 20          # segmentation queries (≥ num foreground classes)
num_blocks: 4      # last 4 ViT blocks receive queries

# ── Logging ────────────────────────────────────────────────────────────────
output_dir: "./checkpoints"
run_name: "eomt_lung_b512"
